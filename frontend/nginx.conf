# ─────────────────────────────────────────────────────────────────────────────
# nginx config for the ML Training Platform SPA (production frontend container).
# - Serves the Vite build output from /usr/share/nginx/html
# - SPA fallback: any non-file, non-asset path returns index.html so client-side
#   routing (React Router) works on deep links and refreshes.
# - gzip enabled for text assets.
# - Long-lived immutable caching for content-hashed files under /assets/.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Hashed static assets (Vite emits fingerprinted files in /assets) ─────
    # Safe to cache forever + immutable because the hash changes on every build.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Other static files with extensions (favicon, logos, fonts) ───────────
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot|map)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # index.html must never be cached so users always pick up the latest bundle
    # reference after a deploy.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Basic security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health/liveness for load balancers.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
